# TEMPORARY workflow to smoke-test the Claude Code CLI integration.
# Runs the Claude Code CLI directly (not the marketplace action, which doesn't
# support `push` events) to confirm the ANTHROPIC_API_KEY secret resolves and
# Claude can edit files in this repo. Delete before merging.

name: Claude smoke test (TMP)

on:
  # push:
  #   branches: [feat/docs-drift-ai]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.186

      - name: Run a trivial Claude prompt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Write a one-line file named claude-smoke.txt at the repo root containing exactly: Claude integration works. Make no other changes." \
            --model claude-sonnet-4-6 \
            --allowedTools Write \
            --permission-mode acceptEdits \
            --max-turns 5

      - name: Show what Claude produced
        run: |
          echo "--- claude-smoke.txt ---"
          cat claude-smoke.txt || echo "FILE NOT CREATED"
