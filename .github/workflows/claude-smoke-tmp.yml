# TEMPORARY workflow to smoke-test the Claude Code action integration.
# Runs a trivial prompt to confirm the ANTHROPIC_API_KEY secret resolves and
# the action can execute against this repo. Delete before merging.

name: Claude smoke test (TMP)

on:
  push:
    branches: [feat/docs-drift-ai]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v6

      - name: Run a trivial Claude prompt
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Write a one-line file named `claude-smoke.txt` at the repo root
            containing exactly: "Claude integration works."
            Make no other changes.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools Write
            --max-turns 5

      - name: Show what Claude produced
        run: |
          echo "--- claude-smoke.txt ---"
          cat claude-smoke.txt || echo "FILE NOT CREATED"
