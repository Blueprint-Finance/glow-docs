# Triggered by external repo. Fetches the merged PR's diff, lets Claude
# update the relevant Docusaurus pages, then opens a DRAFT PR for a
# human to review. Claude is intentionally restricted to editing files only
# (no shell, no git, no network) — the draft PR is opened by a separate
# deterministic step.

name: Docs drift detection

on:
  # The real trigger: each sender repo fires this on PR-merge with the payload
  # contract documented in the README (pr_number, source_repo, pr_title, pr_url).
  # DISABLED for now while we develop — re-enable before merging.
  # repository_dispatch:
  #   types: [source-merged]
  # @TODO: remove this push trigger before merging — for testing on the dev branch only.
  push:
    branches: [feat/docs-drift-ai]
  # Manual trigger for testing without a real merge.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Source PR number"
        required: false
      source_repo:
        description: "Source repo, e.g. Blueprint-Finance/glow-v1"
        required: false

permissions:
  contents: write
  pull-requests: write

# Keyed by source repo + PR so two senders can't collide on one run.
# @TODO: Revert hard-coded fallback values before merging.
concurrency:
  group: ai-docs-${{ github.event.client_payload.source_repo || github.event.inputs.source_repo || 'Blueprint-Finance/glow-v1' }}-${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || '3676' }}
  cancel-in-progress: true

jobs:
  draft-docs:
    runs-on: ubuntu-latest
    # Resolve the source PR once for every step below. The repository_dispatch
    # payload wins, then the workflow_dispatch inputs.
    # @TODO: drop the hardcoded fallbacks (3670 / Blueprint-Finance/glow-v1) before
    # merging — they only exist so the push trigger has something to run against.
    env:
      PR_NUMBER: ${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || '3676' }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo || 'Blueprint-Finance/glow-v1' }}
      PR_TITLE: ${{ github.event.client_payload.pr_title || 'manual run' }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.186

      # Source repos are internal/private, so the workflow's GITHUB_TOKEN (scoped
      # to glow-docs only) can't read them. Clone the source repo with a PAT that
      # has read access instead.
      - name: Clone the source repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo
          fetch-depth: 0

      # Reconstruct the diff from git: fetch the PR head ref and
      # diff it against its merge base with the default branch.
      - name: Build the source PR diff
        run: |
          git -C source-repo fetch --no-tags origin "pull/${PR_NUMBER}/head"
          PR_HEAD=$(git -C source-repo rev-parse FETCH_HEAD)
          BASE=$(git -C source-repo merge-base HEAD "$PR_HEAD")
          git -C source-repo diff "$BASE" "$PR_HEAD" > source-pr.diff
          # Cap the size so the prompt stays sane on huge PRs.
          head -c 80000 source-pr.diff > source-pr.trunc.diff
          mv source-pr.trunc.diff source-pr.diff
          echo "PR #${PR_NUMBER} head: $PR_HEAD"
          echo "Diff size: $(wc -c < source-pr.diff) bytes"
          if [ ! -s source-pr.diff ]; then
            echo "⚠️ Empty diff — the PR's commits may already be in the default" \
                 "branch (e.g. a merge-commit merge). Claude can still investigate" \
                 "source-repo/ directly."
          fi

      # Run the Claude Code CLI directly
      - name: Draft doc updates with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "A PR just merged in a source repo and the docs in THIS repo may
          be out of date. The unified diff for that PR is saved at the repo
          root in \`source-pr.diff\` — read it first. The full source repo is
          also checked out at \`source-repo/\`, so you can investigate the code
          around the change (callers, types, config, neighbouring files).

          Source: ${SOURCE_REPO} PR #${PR_NUMBER} (\"${PR_TITLE}\").

          Your task:
          1. Read \`source-pr.diff\` and explore \`source-repo/\` as needed to
             work out what user-facing behaviour, API surface, props, config, or
             UI changed.
          2. Explore this Docusaurus site to find the page(s) that describe
             those things. Match the existing structure, frontmatter, MDX
             components, \`sidebars.js\`/category config, and the writing tone
             of neighbouring docs.
          3. Update those pages so they reflect the new behaviour. If a brand
             new page is genuinely warranted, create it AND wire it into the
             sidebar/category config.
          4. If the diff has NO documentation impact, make no edits at all.
          5. Finally, write a clear, short PR description (2-4 sentences, plain
             English) to \`pr-summary.md\` at the repo root: what the source PR
             changed and which docs you updated and why. If you made no doc
             changes, write exactly: \`No documentation changes were needed.\`

          Only edit documentation content in THIS repo, plus the \`pr-summary.md\`
          scratch file. Do not modify \`source-repo/\`, \`source-pr.diff\`, CI
          config, or anything else outside the docs." \
            --model claude-sonnet-4-6 \
            --allowedTools Read,Edit,Write,Glob,Grep \
            --permission-mode acceptEdits \
            --max-turns 30

      # Pull Claude's summary into a step output for the PR body. Multiline output
      # needs the heredoc form. Falls back to a placeholder if Claude wrote nothing.
      - name: Capture the AI PR summary
        id: summary
        run: |
          if [ -s pr-summary.md ]; then
            {
              echo "text<<PR_SUMMARY_EOF"
              cat pr-summary.md
              echo "PR_SUMMARY_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "text=_Claude did not produce a summary._" >> "$GITHUB_OUTPUT"
          fi

      # All scratch/untracked; remove them so create-pull-request (which stages
      # everything) doesn't commit the diff, the cloned source repo, or the summary.
      - name: Remove scratch files before opening the PR
        run: rm -rf source-pr.diff source-repo pr-summary.md

      # Normalize the repo into a clean branch slug: drop the constant owner,
      # lowercase, and collapse anything that isn't [a-z0-9] into single dashes.
      # "Blueprint-Finance/glow-v1" -> "glow-v1", so the branch can't turn into a
      # nested ref (the slash) or hit casing inconsistencies.
      - name: Compute the draft branch name
        id: branch
        run: |
          repo="${SOURCE_REPO##*/}"
          slug=$(printf '%s' "$repo" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          echo "name=docs/sync-source-pr-${slug}-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Draft branch: docs/sync-source-pr-${slug}-${PR_NUMBER}"

      - name: Open draft PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.name }}
          draft: true
          title: "docs: sync with ${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}"
          commit-message: "docs: AI draft from ${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}"
          body: |
            🤖 **AI-drafted** from [${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}](https://github.com/${{ env.SOURCE_REPO }}/pull/${{ env.PR_NUMBER }}).

            ${{ steps.summary.outputs.text }}

            > This is a first draft written by Claude from the code diff.
            > **Review it properly** before merging — treat it like a junior's PR,
            > not a finished edit.
          labels: |
            documentation
          delete-branch: true
