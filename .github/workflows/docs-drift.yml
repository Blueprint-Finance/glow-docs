# Triggered by external repo. Clones the source repo, builds a per-file patch for
# everything the merged PR changed, lets Claude read those patches (and the merged
# files) and update the relevant Docusaurus pages, then opens a PR for a human to
# review. Claude is intentionally restricted to editing files only
# (no shell, no git, no network) — the PR is opened by a separate
# deterministic step.

name: Docs drift detection

on:
  # The real trigger: each sender repo fires this on PR-merge with the payload
  # contract documented in the README (pr_number, source_repo, pr_title, pr_url).
  # DISABLED for now while we develop — re-enable before merging.
  # repository_dispatch:
  #   types: [source-merged]
  # @TODO: remove this push trigger before merging — for testing on the dev branch only.
  push:
    branches: [feat/docs-drift-ai]
  # Manual trigger for testing without a real merge.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Source PR number"
        required: true
      source_repo:
        description: "Source repo, e.g. Blueprint-Finance/glow-v1"
        default: Blueprint-Finance/glow-v1
        required: true

permissions:
  contents: write
  pull-requests: write

# Keyed by source repo + PR so two senders can't collide on one run.
# @TODO: Revert hard-coded fallback values before merging.
concurrency:
  group: ai-docs-${{ github.event.client_payload.source_repo || github.event.inputs.source_repo || 'Blueprint-Finance/glow-v1' }}-${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || '3676' }}
  cancel-in-progress: true

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # Resolve the source PR once for every step below. The repository_dispatch
    # payload wins, then the workflow_dispatch inputs.
    # @TODO: drop the hardcoded fallbacks (3676 / Blueprint-Finance/glow-v1) before
    # merging — they only exist so the push trigger has something to run against.
    env:
      PR_NUMBER: ${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || '3676' }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo || 'Blueprint-Finance/glow-v1' }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.186

      # Source repos are internal/private, so the workflow's GITHUB_TOKEN (scoped
      # to glow-docs only) can't read them. Clone the source repo with a PAT that
      # has read access instead.
      - name: Clone the source repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo
          fetch-depth: 0

      # Produce one patch per changed file, plus a Markdown index, under
      # source-pr-patches/. This gives Claude the exact before/after for each file
      # with no single giant (truncation-prone) diff. Rename detection is off so
      # every index row maps to exactly one path -> one patch at <path>.patch.
      - name: Build per-file patches for the PR
        run: |
          git -C source-repo fetch --no-tags origin "pull/${PR_NUMBER}/head"
          PR_HEAD=$(git -C source-repo rev-parse FETCH_HEAD)
          BASE=$(git -C source-repo merge-base HEAD "$PR_HEAD")

          mkdir -p source-pr-patches
          nstmp=$(mktemp)
          git -C source-repo diff --no-renames --name-status "$BASE" "$PR_HEAD" > "$nstmp"

          # index.md: a rendered table linking each changed file to its patch.
          {
            echo "# Files changed by ${SOURCE_REPO} PR #${PR_NUMBER}"
            echo
            echo "| Status | File |"
            echo "| --- | --- |"
          } > source-pr-patches/index.md

          # One patch per file (mirroring the repo layout) + one index row per file.
          while IFS=$'\t' read -r status path; do
            [ -z "$path" ] && continue
            mkdir -p "source-pr-patches/$(dirname "$path")"
            git -C source-repo diff --no-renames "$BASE" "$PR_HEAD" -- "$path" \
              > "source-pr-patches/${path}.patch"
            case "$status" in
              A*) label=Added ;;
              D*) label=Deleted ;;
              M*) label=Modified ;;
              *)  label="$status" ;;
            esac
            echo "| $label | [$path](${path}.patch) |" >> source-pr-patches/index.md
          done < "$nstmp"

          echo "PR #${PR_NUMBER} head: $PR_HEAD"
          echo "Changed files: $(wc -l < "$nstmp")"
          if [ ! -s "$nstmp" ]; then
            echo "_No files changed._" >> source-pr-patches/index.md
            echo "⚠️ No changed files — the PR's commits may already be in the" \
                 "default branch (e.g. a merge-commit merge). Claude can still" \
                 "investigate source-repo/ directly."
          fi

      # Run the Claude Code CLI directly
      - name: Generate doc updates with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "A PR just merged in a source repo and the docs in THIS repo may
          be out of date. What that PR changed is under \`source-pr-patches/\`:
          \`source-pr-patches/index.md\` is a table of every changed file (status +
          path), and the exact diff for each one is at
          \`source-pr-patches/<path>.patch\`. The full source repo, with those
          changes already merged in, is also checked out at \`source-repo/\`.

          Source: ${SOURCE_REPO} PR #${PR_NUMBER}.

          Your task:
          1. Read \`source-pr-patches/index.md\` to see what changed. For each
             file that looks documentation-relevant, read its
             \`source-pr-patches/<path>.patch\` for the exact change.
          2. Assess the real blast radius before deciding what to document. A
             small diff can have a large documentation impact when the changed
             code is reused widely. For each meaningful change, open the file in
             \`source-repo/\` and trace its surroundings — callers, call sites,
             types, config, exported APIs, and neighbouring code — to judge how
             far the behaviour change actually reaches. Document the full
             user-facing impact, not just the literal lines in the patch.
          3. Explore this Docusaurus site to find the page(s) that describe
             those things. Match the existing structure, frontmatter, MDX
             components, \`sidebars.js\`/category config, and the writing tone
             of neighbouring docs.
          4. Update those pages so they reflect the new behaviour. If a brand
             new page is genuinely warranted, create it AND wire it into the
             sidebar/category config.
          5. These docs are PUBLIC, but the source repo is internal/private.
             Never copy private or sensitive information into the docs. This
             includes internal/partner/customer/deal names, internal-only
             URLs, hostnames, file paths, ticket IDs, employee names, secrets,
             credentials, and concrete internal numbers (revenue, fees, limits,
             counts, thresholds) that are not already public. Describe behaviour
             generically (use placeholders or omit the value) instead of leaking
             specifics. When in doubt, leave it out.
          6. If the change has NO documentation impact, make no edits at all.
          7. Finally, write a clear, short PR description (2-4 sentences, plain
             English) to \`pr-summary.md\` at the repo root: what the source PR
             changed and which docs you updated and why. If you made no doc
             changes, write exactly: \`No documentation changes were needed.\`
             If you deliberately omitted or genericised anything for privacy,
             add a short \`Redaction notes:\` line listing what you held back, so
             the human reviewer knows.

          Only edit documentation content in THIS repo, plus the \`pr-summary.md\`
          scratch file. Do not modify \`source-repo/\`, \`source-pr-patches/\`, CI
          config, or anything else outside the docs." \
            --model claude-sonnet-4-6 \
            --allowedTools Read,Edit,Write,Glob,Grep \
            --permission-mode acceptEdits \
            --max-turns 30

      # Pull Claude's summary into a step output for the PR body. Multiline output
      # needs the heredoc form. Falls back to a placeholder if Claude wrote nothing.
      - name: Capture the AI PR summary
        id: summary
        run: |
          if [ -s pr-summary.md ]; then
            {
              echo "text<<PR_SUMMARY_EOF"
              cat pr-summary.md
              echo "PR_SUMMARY_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "text=_Claude did not produce a summary._" >> "$GITHUB_OUTPUT"
          fi

      # create-pull-request stages everything, so anything left here lands in the
      # PR. Remove all of it — the patches, the heavy clone, and the summary.
      - name: Remove scratch files before opening the PR
        run: rm -rf source-pr-patches source-repo pr-summary.md

      # Normalize the repo into a clean branch slug: drop the constant owner,
      # lowercase, and collapse anything that isn't [a-z0-9] into single dashes.
      # "Blueprint-Finance/glow-v1" -> "glow-v1", so the branch can't turn into a
      # nested ref (the slash) or hit casing inconsistencies.
      - name: Compute the branch name
        id: branch
        run: |
          repo="${SOURCE_REPO##*/}"
          slug=$(printf '%s' "$repo" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          echo "name=docs/sync-source-pr-${slug}-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Branch: docs/sync-source-pr-${slug}-${PR_NUMBER}"

      - name: Open the PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          branch: ${{ steps.branch.outputs.name }}
          reviewers: helciofranco
          title: "docs: sync with ${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}"
          commit-message: "docs: AI sync from ${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}"
          body: |
            🤖 **AI-generated** from [${{ env.SOURCE_REPO }} PR #${{ env.PR_NUMBER }}](https://github.com/${{ env.SOURCE_REPO }}/pull/${{ env.PR_NUMBER }})

            ${{ steps.summary.outputs.text }}
          labels: |
            documentation
          delete-branch: true

      # Ask Cursor's Bugbot for a second AI review by commenting its trigger phrase.
      # Only runs when a PR was actually opened (create-pull-request is a no-op when
      # Claude made no edits).
      - name: Request a Bugbot review
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: gh pr comment "$PR_URL" --body "@cursor review"
