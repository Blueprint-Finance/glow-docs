# TEMPORARY workflow for incrementally testing docs-drift.yml.
# Runs only on pushes to the dev branch and exercises one step at a time.
# Delete this file before merging docs-drift.yml.

name: Docs drift detection (TMP)

on:
  push:
    branches: [feat/docs-drift-ai]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  draft-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v6

      # Source repos are internal/private, so the workflow's GITHUB_TOKEN (scoped
      # to glow-docs only) can't read them. For this smoke test we use a PAT with
      # read access instead of the GitHub App token. checkout injects the token
      # via the git credential store, so the PAT never appears in the logs.
      - name: Clone an internal source repo with the PAT
        uses: actions/checkout@v6
        with:
          repository: Blueprint-Finance/glow-v1
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo

      # Prove the clone actually worked: the directory exists, has a .git, has
      # tracked files, and we can read the latest commit.
      - name: Verify the clone
        run: |
          if [ ! -d source-repo/.git ]; then
            echo "❌ source-repo was not cloned (no .git directory)"
            exit 1
          fi
          file_count=$(git -C source-repo ls-files | wc -l)
          echo "✅ Cloned source-repo with $file_count tracked files"
          echo "Latest commit:"
          git -C source-repo log -1 --oneline
